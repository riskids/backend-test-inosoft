services:
  app:
    build: .
    container_name: waste-app
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
    networks:
      - waste-net
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mongodb
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=waste_collection
      - MONGODB_TEST_DATABASE=waste_collection_test
      - SESSION_DRIVER=array
      - CACHE_STORE=array
      - QUEUE_CONNECTION=sync

  nginx:
    image: nginx:alpine
    container_name: waste-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - waste-net

  mongo:
    image: mongo:7.0
    container_name: waste-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - waste-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  waste-net:
    driver: bridge

volumes:
  vendor:
  mongo-data:
